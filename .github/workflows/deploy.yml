name: Deploy site to GitHub Pages

on:
  # Deploy on pushes to the default branch that touch the site or workflow.
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  # Allow manual runs from any branch via the Actions tab.
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. Cancel an in-progress run so a stuck or superseded
# Pages deployment cannot block a newer one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Resolves the Pages origin and base path for this repo, for example
      # https://<owner>.github.io and /<repo>. The build reads these so the
      # site works whether it is served at a subpath or, later, a root domain.
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        # Pages must be enabled once in Settings, Pages, Source: GitHub Actions.
        # The workflow token can deploy to Pages but cannot create the Pages
        # site, so auto-enablement is not used.

      - name: Build
        env:
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
